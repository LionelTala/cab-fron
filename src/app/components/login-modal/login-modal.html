<!-- Arrière-plan de la modale (Sombre et flouté) -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">

  <!-- Conteneur de la modale -->
  <div class="relative w-full max-w-md bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden transform transition-all scale-100">

    <!-- Bouton Fermer (X) -->
    <button (click)="closeModal.emit()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 p-2 rounded-full hover:bg-slate-50 transition">
      <i class="fas fa-times text-lg"></i>
    </button>

    <!-- En-tête de la modale -->
    <div class="px-6 pt-8 pb-4 text-center">
      <div class="inline-flex items-center justify-center bg-indigo-50 text-indigo-600 p-3 rounded-full mb-4">
        <i class="fas fa-lock text-2xl"></i>
      </div>
      <h3 class="text-2xl font-bold text-slate-950">Espace de Connexion</h3>
      <p class="text-sm text-slate-500 mt-1">Saisissez vos identifiants pour accéder à votre espace.</p>
    </div>

    <!-- Formulaire -->
    <form (ngSubmit)="onSubmit()" class="px-6 pb-8 space-y-4">

        <!-- Gestion des alertes d'erreur avec la syntaxe Angular 21 -->
        @if (errorMessage) {
          <div class="p-3 bg-red-50 border border-red-200 text-red-600 rounded-xl text-sm font-medium flex items-center space-x-2 animate-fade-in">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ errorMessage }}</span>
          </div>
        }

        <!-- Champ Identifiant / Matricule -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Matricule ou Adresse Email</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
              <i class="fas fa-user"></i>
            </span>
            <input
              type="text"
              name="username"
              [(ngModel)]="loginData.username"
              placeholder="Ex: 26DM9389 ou admin@centre.com"
              class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition"
              [disabled]="isLoading"
              required>
          </div>
        </div>

        <!-- Champ Mot de passe -->
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-sm font-semibold text-slate-700">Mot de passe</label>
            <a href="#" class="text-xs font-semibold text-indigo-600 hover:text-indigo-700">Mot de passe oublié ?</a>
          </div>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
              <i class="fas fa-key"></i>
            </span>
            <input
              type="password"
              name="password"
              [(ngModel)]="loginData.password"
              placeholder="••••••••"
              class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition"
              [disabled]="isLoading"
              required>
          </div>
        </div>

        <!-- Bouton de Soumission Dynamique -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full flex items-center justify-center space-x-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all hover:-translate-y-0.5 active:translate-y-0 mt-6">

          @if (isLoading) {
            <i class="fas fa-spinner animate-spin"></i>
            <span>Vérification en cours...</span>
          } @else {
            <i class="fas fa-sign-in-alt"></i>
            <span>Se connecter</span>
          }

        </button>

      </form>
  </div>
</div>
