<div class="min-h-screen bg-slate-50 text-slate-800 flex font-sans overflow-hidden relative">

  <!-- ================= SIDEBAR ================= -->
  <aside
    [class.-translate-x-full]="!isSidebarOpen"
    [class.translate-x-0]="isSidebarOpen"
    class="w-64 bg-white border-r border-slate-200 flex flex-col justify-between h-screen fixed md:sticky top-0 left-0 shrink-0 shadow-sm z-30 transition-transform duration-300 ease-in-out md:translate-x-0">

    <div>
      <!-- Logo -->
      <div class="h-16 flex items-center justify-between px-6 border-b border-slate-100">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-[#1a56db] flex items-center justify-center shadow-md shadow-[#1a56db]/20">
            <span class="font-black text-sm text-white">C</span>
          </div>
          <span class="font-bold text-lg tracking-wider text-slate-900">CAB Admin</span>
        </div>
        <button (click)="toggleSidebar()" class="md:hidden text-slate-500 p-1 hover:bg-slate-100 rounded-lg cursor-pointer">
          ✕
        </button>
      </div>

      <!-- Navigation -->
      <nav class="p-4 space-y-1.5">
        <a
          routerLink="/admin/dashboard"
          [routerLinkActive]="['bg-[#1a56db]', 'text-white']"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-900 font-medium transition-all"
        >
          <span class="text-lg">📊</span>
          <span>Vue d'ensemble</span>
        </a>

        <a
          routerLink="/admin/dashboard/formations"
          routerLinkActive="bg-[#1a56db] text-white"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-900 font-medium transition-all"
        >
          <span class="text-lg">🎓</span>
          <span>Formations</span>
        </a>

        <a
          routerLink="/admin/dashboard/waves"
          routerLinkActive="bg-[#1a56db] text-white"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-900 font-medium transition-all"
        >
          <span class="text-lg">🌊</span>
          <span>Vagues / Cohortes</span>
        </a>

        <a
          routerLink="/admin/dashboard/etudiants"
          routerLinkActive="bg-[#1a56db] text-white"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-900 font-medium transition-all"
        >
          <span class="text-lg">👥</span>
          <span>Étudiants</span>
        </a>

        <!-- ⭐ CANDIDATURES AVEC COMPTEUR -->
        <a
          routerLink="/admin/dashboard/candidatures"
          routerLinkActive="bg-[#1a56db] text-white"
          class="flex items-center justify-between gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-900 font-medium transition-all"
        >
          <div class="flex items-center gap-3">
            <span class="text-lg">📋</span>
            <span>Candidatures</span>
          </div>
          @if (candidaturesEnAttente > 0) {
            <span class="bg-red-500 text-white text-xs font-bold px-2.5 py-1 rounded-full animate-pulse">
              {{ candidaturesEnAttente }}
            </span>
          }
        </a>
      </nav>
    </div>

    <!-- Déconnexion -->
    <div class="p-4 border-t border-slate-100">
      <button (click)="onLogout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-slate-50 hover:bg-red-50 text-slate-600 hover:text-red-600 border border-slate-200 hover:border-red-200 font-medium transition-all cursor-pointer">
        <span>🚪</span>
        <span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Overlay mobile -->
  @if (isSidebarOpen) {
    <div (click)="toggleSidebar()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-20 md:hidden transition-opacity"></div>
  }

  <!-- ================= CONTENU PRINCIPAL ================= -->
  <main class="flex-1 h-screen overflow-y-auto flex flex-col w-full">

    <!-- Header -->
    <header class="h-16 border-b border-slate-200 bg-white/80 backdrop-blur-md flex items-center justify-between px-4 md:px-8 sticky top-0 z-10">
      <div class="flex items-center gap-3">
        <button (click)="toggleSidebar()" class="md:hidden text-2xl p-2 text-slate-600 hover:bg-slate-100 rounded-xl cursor-pointer">
          ☰
        </button>
        <div>
          <h1 class="text-base md:text-xl font-bold text-slate-900">Tableau de bord</h1>
          <p class="hidden sm:block text-xs text-slate-500">Espace d'administration globale</p>
        </div>
      </div>
      <div class="flex items-center gap-3 bg-slate-50 border border-slate-200 px-4 py-2 rounded-full">
        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
        <span class="text-xs md:text-sm font-semibold text-slate-700">Super Admin</span>
      </div>
    </header>

    <!-- ⭐ ROUTER OUTLET (contenu des pages) -->
    <router-outlet></router-outlet>

  </main>
</div>
